services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${FuaGen_DB__USER:-fuagenerator}
      POSTGRES_PASSWORD: ${FuaGen_DB_PASSWORD:-fuagenerator}
      POSTGRES_DB: ${FuaGen_DB_NAME:-fuagenerator}
    volumes:
      - FuaGenerator_DB_Data:/var/lib/postgresql/data
     # - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # Optional initialization
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuagenerator -d fuagenerator"]
      interval: 5s
      timeout: 5s
      retries: 5


  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "3000:3000"
    links:
      - db

volumes:
  FuaGenerator_DB_Data: